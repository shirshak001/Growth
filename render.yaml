services:
  # 1. Backend Web Service (Node.js/Express)
  - type: web
    name: growth-backend
    env: node
    buildCommand: npm install
    startCommand: node backend/server.js
    envVars:
      - key: PORT
        value: 5050
      - key: JWT_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: AUTH0_ISSUER_BASE_URL
        value: https://AUTH0-DOMAIN
      - key: AUTH0_CLIENT_ID
        value: AUTH0-CLIENT-ID
      - key: AUTH0_CLIENT_SECRET
        value: AUTH0-CLIENT-SECRET
    disk:
      name: growth-db-data
      mountPath: /opt/render/project/src/backend/data
      sizeGB: 1

  # 2. Frontend Static Site (React/Vite)
  - type: web
    name: growth-frontend
    env: static
    buildCommand: npm run build
    publishDir: frontend/dist
    envVars:
      - key: VITE_API_BASE
        value: https://growth-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
